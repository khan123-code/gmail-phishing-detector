<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width:280px; padding:16px; font-family:Arial,sans-serif; }
    h3 { margin:0 0 12px; font-size:15px; }
    #status { padding:12px; border-radius:8px; text-align:center; font-size:14px; margin-bottom:12px; }
    .safe    { background:#e6f4ea; color:#1e8e3e; }
    .phish   { background:#fce8e6; color:#c5221f; }
    .unknown { background:#f5f5f5; color:#666; }
    button   { width:100%; padding:8px; border-radius:6px; border:none;
                background:#1a73e8; color:white; font-size:13px; cursor:pointer; }
    button:hover { background:#1557b0; }
  </style>
</head>
<body>
  <h3>🛡️ Phishing Detector</h3>
  <div id="status" class="unknown">Open an email to scan</div>
  <script src="popup.js"></script>
</body>
</html>
